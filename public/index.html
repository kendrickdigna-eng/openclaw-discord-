<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 管理后台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #e0e0e0; }
    .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #1a1a2e; padding: 40px; border-radius: 16px; width: 400px; text-align: center; border: 1px solid #2a2a4a; }
    .login-box h1 { font-size: 24px; margin-bottom: 8px; }
    .login-box p { color: #888; margin-bottom: 24px; }
    .login-box .logo { font-size: 48px; margin-bottom: 16px; }
    .layout { display: flex; height: 100vh; }
    .sidebar { width: 220px; background: #1a1a2e; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid #2a2a4a; font-size: 18px; font-weight: 600; }
    .sidebar-nav { flex: 1; padding: 8px; }
    .nav-item { padding: 12px 16px; cursor: pointer; border-radius: 8px; margin-bottom: 4px; color: #aaa; display: flex; align-items: center; gap: 10px; }
    .nav-item:hover { background: #252545; color: #e0e0e0; }
    .nav-item.active { background: #3a3a6a; color: #fff; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { height: 50px; background: #1a1a2e; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .content { flex: 1; padding: 20px; overflow-y: auto; }
    .card { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #2a2a4a; }
    .card h3 { margin-bottom: 16px; font-size: 16px; }
    .stat-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat-card { background: linear-gradient(135deg, #1a237e, #283593); border-radius: 12px; padding: 20px; flex: 1; min-width: 150px; color: #fff; }
    .stat-card .label { font-size: 13px; opacity: 0.8; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2a4a; }
    .info-label { color: #888; }
    .loading { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/vue@3.4.4/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.full.min.js"></script>
<script>
if (!window.Vue) {
  document.getElementById('app').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#f56c6c"><div style="text-align:center"><h2>Vue 加载失败</h2><p>请检查网络连接，或尝试刷新页面</p></div></div>';
} else if (!window.ElementPlus) {
  document.getElementById('app').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#f56c6c"><div style="text-align:center"><h2>ElementPlus 加载失败</h2><p>请检查网络连接，或尝试刷新页面</p></div></div>';
} else {
const { createApp, ref, reactive, computed, onMounted } = Vue;

const app = createApp({
  setup() {
    const authenticated = ref(false);
    const password = ref('');
    const loginLoading = ref(false);
    const loginError = ref('');
    const currentPage = ref('dashboard');
    const config = ref({});
    const gatewayStatus = ref('unknown');
    const gatewayInfo = ref({});
    const agents = ref([]);
    const bindings = ref([]);
    const discord = reactive({ enabled: false, allowBots: false, accounts: {} });

    async function api(path, opts = {}) {
      const res = await fetch('/api' + path, { 
        headers: { 'Content-Type': 'application/json' },
        ...opts 
      });
      if (res.status === 401) { authenticated.value = false; throw new Error('未授权'); }
      const text = await res.text();
      try { return JSON.parse(text); } catch { throw new Error('服务器错误'); }
    }

    async function login() {
      loginLoading.value = true;
      loginError.value = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: password.value })
        });
        const data = await res.json();
        if (data.success) {
          authenticated.value = true;
          loadData();
        } else {
          loginError.value = data.error || '登录失败';
        }
      } catch (e) { loginError.value = '网络错误'; }
      loginLoading.value = false;
    }

    function logout() {
      fetch('/api/auth/logout', { method: 'POST' });
      authenticated.value = false;
      password.value = '';
    }

    async function loadData() {
      try {
        const [c, gw, a, b, d] = await Promise.all([
          api('/config').catch(() => ({})),
          api('/gateway/status').catch(() => ({})),
          api('/agents').catch(() => []),
          api('/bindings').catch(() => []),
          api('/discord').catch(() => ({ enabled: false, accounts: {} }))
        ]);
        config.value = c;
        gatewayInfo.value = gw;
        gatewayStatus.value = gw.status || 'unknown';
        agents.value = a || [];
        bindings.value = b || [];
        Object.assign(discord, d);
      } catch (e) { console.error(e); }
    }

    async function gatewayAction(action) {
      try {
        await api('/gateway/' + action, { method: 'POST' });
        setTimeout(loadData, 2000);
      } catch (e) { ElementPlus.ElMessage.error(e.message); }
    }

    onMounted(async () => {
      try {
        const res = await fetch('/api/auth/check');
        const data = await res.json();
        if (data.authenticated) {
          authenticated.value = true;
          loadData();
        }
      } catch (e) {}
    });

    const discordAccountCount = computed(() => Object.keys(discord.accounts || {}).length);

    return {
      authenticated, password, loginLoading, loginError,
      currentPage, config, gatewayStatus, gatewayInfo, agents, bindings, discord,
      login, logout, gatewayAction, discordAccountCount
    };
  },
  template: `
    <div v-if="!authenticated" class="login-container">
      <div class="login-box">
        <div class="logo">🦞</div>
        <h1>OpenClaw 管理后台</h1>
        <p>请输入管理密码登录</p>
        <el-input v-model="password" type="password" placeholder="管理密码" show-password size="large" 
          @keyup.enter="login" style="margin-bottom:16px">
          <template #prefix><i class="fas fa-key"></i></template>
        </el-input>
        <el-button type="primary" size="large" :loading="loginLoading" @click="login" style="width:100%">登录</el-button>
        <div v-if="loginError" style="color:#f56c6c;margin-top:12px">{{ loginError }}</div>
      </div>
    </div>
    <div v-else class="layout">
      <div class="sidebar">
        <div class="sidebar-header">🦞 OpenClaw</div>
        <div class="sidebar-nav">
          <div class="nav-item" :class="{active:currentPage==='dashboard'}" @click="currentPage='dashboard'">
            <i class="fas fa-tachometer-alt"></i> 仪表盘
          </div>
          <div class="nav-item" :class="{active:currentPage==='discord'}" @click="currentPage='discord'">
            <i class="fab fa-discord"></i> Discord
          </div>
          <div class="nav-item" :class="{active:currentPage==='gateway'}" @click="currentPage='gateway'">
            <i class="fas fa-server"></i> Gateway
          </div>
        </div>
      </div>
      <div class="main">
        <div class="topbar">
          <span>OpenClaw Admin</span>
          <el-button text @click="logout"><i class="fas fa-sign-out-alt"></i> 退出</el-button>
        </div>
        <div class="content">
          <!-- Dashboard -->
          <div v-if="currentPage==='dashboard'">
            <div class="stat-row" style="margin-bottom:20px">
              <div class="stat-card">
                <div class="label">Agent</div>
                <div class="value">{{ agents.length }}</div>
              </div>
              <div class="stat-card" style="background:linear-gradient(135deg,#1b5e20,#2e7d32)">
                <div class="label">Gateway</div>
                <div class="value" style="font-size:18px">{{ gatewayStatus==='running'?'运行中':gatewayStatus==='stopped'?'已停止':'未知' }}</div>
              </div>
              <div class="stat-card" style="background:linear-gradient(135deg,#4a148c,#6a1b9a)">
                <div class="label">Discord</div>
                <div class="value">{{ discordAccountCount }}</div>
              </div>
              <div class="stat-card" style="background:linear-gradient(135deg,#e65100,#f57c00)">
                <div class="label">绑定</div>
                <div class="value">{{ bindings.length }}</div>
              </div>
            </div>
            <div class="card">
              <h3>配置概览</h3>
              <div class="info-row"><span class="info-label">Gateway 端口</span><span>{{ config.gateway?.port || '—' }}</span></div>
              <div class="info-row"><span class="info-label">Gateway 模式</span><span>{{ config.gateway?.mode || '—' }}</span></div>
              <div class="info-row"><span class="info-label">默认模型</span><span>{{ config.agents?.defaults?.model?.primary || '—' }}</span></div>
              <div class="info-row"><span class="info-label">工具权限</span><span>{{ config.tools?.profile || '—' }}</span></div>
            </div>
          </div>
          <!-- Discord -->
          <div v-if="currentPage==='discord'">
            <div class="card">
              <h3><i class="fab fa-discord"></i> Discord Bot 管理</h3>
              <div class="info-row"><span class="info-label">启用</span><span>{{ discord.enabled ? '✅' : '❌' }}</span></div>
              <div class="info-row"><span class="info-label">allowBots</span><span>{{ discord.allowBots ? '✅' : '❌' }}</span></div>
              <div class="info-row"><span class="info-label">账号数量</span><span>{{ discordAccountCount }}</span></div>
            </div>
          </div>
          <!-- Gateway -->
          <div v-if="currentPage==='gateway'">
            <div class="card">
              <h3><i class="fas fa-server"></i> Gateway 管理</h3>
              <div style="margin-bottom:16px;display:flex;gap:8px">
                <el-button type="success" @click="gatewayAction('start')"><i class="fas fa-play"></i> 启动</el-button>
                <el-button type="danger" @click="gatewayAction('stop')"><i class="fas fa-stop"></i> 停止</el-button>
                <el-button type="warning" @click="gatewayAction('restart')"><i class="fas fa-redo"></i> 重启</el-button>
              </div>
              <div class="info-row"><span class="info-label">状态</span><span>{{ gatewayStatus }}</span></div>
              <div class="info-row"><span class="info-label">PID</span><span>{{ gatewayInfo.pid || '—' }}</span></div>
              <div class="info-row"><span class="info-label">端口</span><span>{{ gatewayInfo.port || '—' }}</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `
});

app.use(ElementPlus);
app.mount('#app');
}
</script>
</body>
</html>
